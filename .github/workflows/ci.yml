name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pmo
          POSTGRES_USER: pmo
          POSTGRES_PASSWORD: pmo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pmo -d pmo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Backend tests
        working-directory: src/backend
        run: gradle test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: src/ui
        run: npm install
      - name: Unit tests
        working-directory: src/ui
        run: npm run test:unit
      - name: Install Playwright
        working-directory: src/ui
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        working-directory: src/ui
        run: npm run test:e2e
