services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmo}
      POSTGRES_USER: ${POSTGRES_USER:-pmo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmo}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../src/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmo} -d ${POSTGRES_DB:-pmo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../src/backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pmo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pmo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pmo}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local-dev-secret}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  ui:
    build:
      context: ../src/ui
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}/api/v1
    depends_on:
      - backend
    ports:
      - "${UI_PORT:-5173}:5173"

volumes:
  pg_data:
